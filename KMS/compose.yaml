name: kms
services:
  app:
    image: 11notes/kms:1.0.0
    environment:
      TZ: America/Toronto
    volumes:
      - var:/kms/var
    ports:
      - 1688:1688/tcp
    restart: unless-stopped
  gui:
    image: 11notes/kms-gui:1
    depends_on:
      app:
        condition: service_healthy
        restart: true
    environment:
      TZ: America/Toronto
    volumes:
      - var:/kms/var
    ports:
      - 3000:3000/tcp
    restart: unless-stopped
volumes:
  var: null