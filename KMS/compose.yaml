name: kms
services:
  app:
    image: 11notes/kms:1.0.0
    environment:
      TZ: America/Toronto
    volumes:
      - var:/kms/var
    ports:
      - 1688:1688/tcp
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "netstat -ln | grep :1688 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
  gui:
    image: 11notes/kms-gui:1
    depends_on:
      app:
        condition: service_healthy
        restart: true
    environment:
      TZ: America/Toronto
    volumes:
      - var:/kms/var
    ports:
      - 3000:3000/tcp
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
volumes:
  var: null