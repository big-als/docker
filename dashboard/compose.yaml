services:
  homarr:
    image: ghcr.io/homarr-labs/homarr:latest
    container_name: homarr
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - homarr-configs:/app/data/configs
      - homarr-icons:/app/public/icons
      - homarr-data:/data
    ports:
      - 7575:7575
    restart: unless-stopped

volumes:
  homarr-configs:
  homarr-icons:
  homarr-data:
