services:
  homarr:
    image: ghcr.io/homarr-labs/homarr:latest
    container_name: homarr
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - homarr-data:/app/data
    ports:
      - 7575:7575
    environment:
      SECRET_ENCRYPTION_KEY: ${SECRET_ENCRYPTION_KEY}
    restart: unless-stopped

volumes:
  homarr-data:
