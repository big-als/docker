services:
  Cloudflare:
    restart: unless-stopped
    image: alexhorst/cloudflare-ddns:alpine
    environment:
      - CF_EMAIL=${CF_EMAIL}
      - CF_API_TOKEN=${CF_API_TOKEN}
      - CF_ZONE_ID=${CF_ZONE_ID}
      - CF_RECORD_NAME=${CF_RECORD_NAME}
      - TZ=${TZ}
      - CHECK_INTERVAL=${CHECK_INTERVAL}
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider https://api.cloudflare.com/client/v4/ips || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 15s